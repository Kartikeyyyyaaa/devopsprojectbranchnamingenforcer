# Nagios service definition – Branch Enforcer CI health check

define host {
    use                 linux-server
    host_name           branch-enforcer-ci
    alias               Branch Enforcer CI Server
    address             127.0.0.1
    max_check_attempts  3
}

define service {
    use                   generic-service
    host_name             branch-enforcer-ci
    service_description   Branch Enforcer – Unit Tests
    check_command         check_http!-p 8080 -u /health
    check_interval        5
    retry_interval        1
    max_check_attempts    3
    notification_interval 30
}

define service {
    use                   generic-service
    host_name             branch-enforcer-ci
    service_description   Branch Enforcer – Docker Container
    check_command         check_procs!-c 1:10 -a "branch-enforcer"
    check_interval        5
}
