name: CI/CD – Branch Naming Convention Enforcer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint source code
        run: flake8 src/main/python/ --max-line-length=100 --statistics || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run unit tests
        run: pytest tests/unit/ -v || true

      - name: Run integration tests
        run: pytest tests/integration/ -v || true

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: tests/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build \
            -t branch-enforcer:${{ github.sha }} \
            -f infrastructure/docker/Dockerfile . || true

  validate-branch:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Validate current branch
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "Validating branch: $BRANCH"
          python src/main/python/branch_enforcer.py validate "$BRANCH" || true

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Deploy simulation
        run: |
          echo "Deploying branch-enforcer to staging..."
          echo "Image: branch-enforcer:${{ github.sha }}"
          echo "Time: $(date -u)"
          echo "Student: Kartikeya Aryan Mishra – 23FE10CSE00736"
          echo "Deployment simulation successful"
