name: CI/CD – Branch Naming Convention Enforcer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint & Code Quality ─────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint source code
        run: flake8 src/main/python/ --max-line-length=100 --statistics

  # ── 2. Unit + Integration Tests ────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --junitxml=test-results/unit.xml \
            --cov=src/main/python \
            --cov-report=xml:coverage.xml

      - name: Run integration tests
        run: pytest tests/integration/ -v --junitxml=test-results/integration.xml

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: test-results/

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

  # ── 3. Build Docker Image ──────────────────────────────────
  build:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build \
            -t branch-enforcer:${{ github.sha }} \
            -f infrastructure/docker/Dockerfile .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: branch-enforcer:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL

  # ── 4. Self-Test (validate branch name in CI) ─────────────
  validate-branch:
    name: Validate CI Branch Name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Validate current branch
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "Validating branch: $BRANCH"
          python src/main/python/branch_enforcer.py validate "$BRANCH" || \
            echo "⚠️  Branch name '$BRANCH' does not meet conventions (CI info only)"

  # ── 5. Deploy (main branch only) ──────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Deploy (simulation)
        run: |
          echo "🚀  Deploying branch-enforcer to staging..."
          echo "    Image: branch-enforcer:${{ github.sha }}"
          echo "    Time : $(date -u)"
          echo "✅  Deployment simulation successful"
