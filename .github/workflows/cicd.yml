name: CI/CD – Branch Naming Convention Enforcer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8
      - run: flake8 src/main/python/ --max-line-length=100 || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest
      - run: pytest tests/unit/ -v
      - run: pytest tests/integration/ -v

  validate-branch:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate branch
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "Validating: $BRANCH"
          python src/main/python/branch_enforcer.py validate "$BRANCH" || true

  deploy:
    name: Deploy Simulation
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Simulate deployment
        run: |
          echo "Deploying branch-enforcer..."
          echo "Student: Kartikeya Aryan Mishra – 23FE10CSE00736"
          echo "Deployment successful!"
